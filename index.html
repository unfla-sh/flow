<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="description" content="Flow is a fast, browser-based editor for mapping integrations, decision logic, data pipelines and approval chains as clean, interactive diagrams." />
  <title>Flow — Design workflows, not infrastructure</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fbfdff;
      font-family: Inter, system-ui, sans-serif;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .hero {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 8vw;
      color: #071b4d;
      pointer-events: none;
    }
    .hero-content {
      max-width: 620px;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 22px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(39, 104, 230, 0.08);
      color: #2768e6;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    h1 {
      margin: 0;
      font-size: clamp(54px, 7vw, 96px);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 760;
    }
    h1 em {
      color: #1f63d8;
      font-family: Georgia, serif;
      font-weight: 400;
    }
    p {
      margin-top: 26px;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.7;
      color: #405075;
    }
    .buttons {
      margin-top: 34px;
      display: flex;
      gap: 14px;
      pointer-events: auto;
    }
    .btn {
      display: inline-block;
      border: 0;
      border-radius: 12px;
      padding: 15px 22px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-size: 15px;
    }
    .primary {
      background: #06246b;
      color: white;
      box-shadow: 0 18px 34px rgba(6, 36, 107, 0.2);
    }
    .secondary {
      background: rgba(255,255,255,0.78);
      color: #06246b;
      border: 1px solid rgba(6, 36, 107, 0.14);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <canvas id="xmb-lines"></canvas>
  <section class="hero">
    <div class="hero-content">
      <div class="eyebrow">BROWSER-NATIVE · OPEN · PRIVATE</div>
      <h1>Design workflows,<br>not <em>infrastructure.</em></h1>
      <p>
        Flow is a fast, browser-based editor for mapping integrations,
        decision logic, data pipelines and approval chains as clean,
        interactive diagrams.
      </p>
      <div class="buttons">
        <a class="btn primary" href="/app/">Open Editor →</a>
        <a class="btn secondary" href="/app/">View Demo ▶</a>
      </div>
    </div>
  </section>
  <script>
    const canvas = document.getElementById("xmb-lines");
    const ctx = canvas.getContext("2d");
    let w, h, dpr;
    const state = {
      time: 0,
      drift: 0,
      mouseX: 0.5,
      mouseY: 0.5,
      energy: 1
    };
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);
    window.addEventListener("mousemove", (e) => {
      gsap.to(state, {
        mouseX: e.clientX / w,
        mouseY: e.clientY / h,
        duration: 1.4,
        ease: "power3.out"
      });
    });
    function waveY(x, lane, groupPhase, verticalOffset) {
      const t = x / w;
      const base =
        h * 0.64 +
        verticalOffset;
      const broad =
        Math.sin(
          t * Math.PI * 1.45 +
          state.time * 0.42 +
          groupPhase
        ) * h * 0.105;
      const medium =
        Math.sin(
          t * Math.PI * 3.15 -
          state.time * 0.24 +
          lane * 0.065
        ) * h * 0.035;
      const fine =
        Math.sin(
          t * Math.PI * 6.2 +
          state.time * 0.16 +
          lane * 0.24
        ) * h * 0.012;
      const xmbSweep =
        Math.sin(
          (t * 0.8 + state.time * 0.045 + lane * 0.002) * Math.PI * 2
        ) * h * 0.035;
      const rightLift =
        Math.pow(t, 2.2) * h * 0.11;
      const leftSettle =
        Math.pow(1 - t, 2.8) * h * 0.04;
      const mouseInfluence =
        Math.exp(-Math.pow(t - state.mouseX, 2) * 18) *
        (state.mouseY - 0.5) *
        h *
        0.055;
      return (
        base +
        broad +
        medium +
        fine +
        xmbSweep -
        rightLift +
        leftSettle +
        mouseInfluence * state.energy
      );
    }
    function drawLine({
      lane,
      groupPhase,
      verticalOffset,
      alpha,
      width,
      color,
      dashed = false
    }) {
      const steps = 180;
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const x = (i / steps) * w;
        const y = waveY(x, lane, groupPhase, verticalOffset);
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          const px = ((i - 1) / steps) * w;
          const py = waveY(px, lane, groupPhase, verticalOffset);
          const mx = (px + x) / 2;
          const my = (py + y) / 2;
          ctx.quadraticCurveTo(px, py, mx, my);
        }
      }
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.shadowBlur = 0;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = width;
      if (dashed) {
        ctx.setLineDash([1.5, 7]);
      } else {
        ctx.setLineDash([]);
      }
      ctx.stroke();
      ctx.restore();
    }
    function drawBlueLineField() {
      /*
        Main XMB-like contour group.
        Many thin blue lines, no glow.
      */
      const count = 88;
      for (let i = 0; i < count; i++) {
        const k = i / (count - 1);
        const verticalOffset =
          (k - 0.5) * h * 0.32;
        const centerWeight =
          Math.sin(k * Math.PI);
        const alpha =
          0.018 + centerWeight * 0.072;
        const width =
          0.42 + centerWeight * 0.68;
        const blue =
          Math.round(170 + centerWeight * 54);
        const r =
          Math.round(55 + centerWeight * 28);
        const g =
          Math.round(102 + centerWeight * 48);
        drawLine({
          lane: i,
          groupPhase: 0.0 + state.drift,
          verticalOffset,
          alpha,
          width,
          color: `rgb(${r}, ${g}, ${blue})`,
          dashed: false
        });
      }
      /*
        A few slightly stronger structural ribbons.
        Still no glow, just flat transparent strokes.
      */
      const ribbons = [
        { offset: -76, width: 2.3, alpha: 0.12, phase: 0.2, color: "rgb(36, 86, 180)" },
        { offset: -36, width: 1.8, alpha: 0.13, phase: 0.9, color: "rgb(55, 115, 210)" },
        { offset:  10, width: 2.6, alpha: 0.10, phase: 1.7, color: "rgb(92, 150, 226)" },
        { offset:  54, width: 1.7, alpha: 0.12, phase: 2.4, color: "rgb(30, 75, 170)" },
        { offset:  96, width: 2.1, alpha: 0.08, phase: 3.2, color: "rgb(130, 177, 235)" }
      ];
      ribbons.forEach((r, index) => {
        drawLine({
          lane: index * 8,
          groupPhase: r.phase + state.drift * 0.35,
          verticalOffset: r.offset,
          alpha: r.alpha,
          width: r.width,
          color: r.color
        });
      });
      /*
        Dotted particle-like contour lines.
        Similar to the generated background images.
      */
      for (let i = 0; i < 18; i++) {
        const k = i / 17;
        drawLine({
          lane: i * 4 + 2,
          groupPhase: 1.4 + state.drift * 0.25,
          verticalOffset: (k - 0.5) * h * 0.28,
          alpha: 0.045,
          width: 0.8,
          color: "rgb(78, 132, 218)",
          dashed: true
        });
      }
    }
    function drawFineBlueDots() {
      /*
        Small moving points along the wave path.
        Very subtle, not glowing.
      */
      const total = 70;
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      for (let i = 0; i < total; i++) {
        const progress =
          (i / total + state.time * 0.018 + Math.sin(i) * 0.01) % 1;
        const lane =
          i % 42;
        const y =
          waveY(
            progress * w,
            lane,
            1.2,
            Math.sin(i * 0.7) * h * 0.12
          );
        const x = progress * w;
        const r = 0.7 + (i % 4) * 0.18;
        const alpha = 0.08 + (i % 5) * 0.018;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(50, 105, 210, ${alpha})`;
        ctx.fill();
      }
      ctx.restore();
    }
    function drawWhiteReadabilityMask() {
      /*
        Keeps hero text clean.
      */
      const horizontal = ctx.createLinearGradient(0, 0, w, 0);
      horizontal.addColorStop(0, "rgba(255,255,255,0.98)");
      horizontal.addColorStop(0.42, "rgba(255,255,255,0.82)");
      horizontal.addColorStop(0.72, "rgba(255,255,255,0.18)");
      horizontal.addColorStop(1, "rgba(255,255,255,0.04)");
      ctx.fillStyle = horizontal;
      ctx.fillRect(0, 0, w, h);
      const vertical = ctx.createLinearGradient(0, 0, 0, h);
      vertical.addColorStop(0, "rgba(255,255,255,0.96)");
      vertical.addColorStop(0.34, "rgba(255,255,255,0.42)");
      vertical.addColorStop(0.75, "rgba(255,255,255,0.05)");
      vertical.addColorStop(1, "rgba(255,255,255,0.68)");
      ctx.fillStyle = vertical;
      ctx.fillRect(0, 0, w, h);
    }
    function render() {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fbfdff";
      ctx.fillRect(0, 0, w, h);
      drawBlueLineField();
      drawFineBlueDots();
      drawWhiteReadabilityMask();
    }
    gsap.ticker.add(() => {
      state.time += 0.016 * gsap.ticker.deltaRatio();
      render();
    });
    gsap.to(state, {
      drift: Math.PI * 2,
      duration: 34,
      repeat: -1,
      ease: "none"
    });
    gsap.to(state, {
      energy: 1.18,
      duration: 5.5,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });
  </script>
</body>
</html>
